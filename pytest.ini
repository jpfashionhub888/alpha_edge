# pytest.ini
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short tracebacks by default; -v for verbose
addopts =
    --tb=short
    -q

# Coverage settings (used when running pytest --cov)
# Run: pytest --cov=. --cov-report=term-missing

# Ignore generated/cache dirs
norecursedirs =
    venv
    .git
    __pycache__
    node_modules
    catboost_info
    model_cache
    saved_models
    logs
    docs

name: AlphaEdge Daily Scan

on:
  schedule:
    - cron: '45 13 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '15 20 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

            - name: Install dependencies
        run: |
          pip install websockets>=12.0
          pip install yfinance pandas numpy scikit-learn
          pip install xgboost lightgbm
          pip install ccxt requests beautifulsoup4 ta
          pip install plotly dash python-dotenv schedule
          pip install transformers feedparser flask
          pip install alpaca-trade-api
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: List files for debug
        run: |
          echo "Files in root:"
          ls -la
          echo "Files in data:"
          ls -la data/ || echo "data folder missing"
          echo "Files in models:"
          ls -la models/ || echo "models folder missing"

      - name: Run daily scan
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python cloud_scan.py

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trading-logs
          path: logs/
          retention-days: 7
          if-no-files-found: ignore
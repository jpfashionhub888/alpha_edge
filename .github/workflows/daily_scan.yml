name: AlphaEdge Daily Scan

on:
  schedule:
    - cron: '45 13 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '15 20 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy scikit-learn
          pip install xgboost lightgbm
          pip install ccxt requests beautifulsoup4 ta
          pip install plotly dash python-dotenv schedule
          pip install transformers feedparser flask
          pip install alpaca-trade-api
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install "websockets>=12.0" --force-reinstall

      - name: List files
        run: |
          ls -la
          ls -la data/ || echo "data missing"
          ls -la models/ || echo "models missing"

      - name: Run daily scan
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Token starts with: ${TELEGRAM_BOT_TOKEN:0:10}"
          echo "Chat ID: $TELEGRAM_CHAT_ID"
          python cloud_scan.py

      - name: Save trading state and generate dashboard
        if: always()
        run: |
          git config --global user.email "alphaedge-bot@github.com"
          git config --global user.name "AlphaEdge Bot"
          mkdir -p logs
          mkdir -p docs
          python generate_dashboard.py || true
          git add -f logs/paper_trades.json || true
          git add -f logs/latest_signals.json || true
          git add -f logs/sectors.json || true
          git add -f logs/earnings.json || true
          git add -f docs/index.html || true
          git add -f model_cache/ || true
          git diff --staged --quiet || git commit -m "Auto: Trading state + dashboard update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload logs as backup
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trading-logs
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

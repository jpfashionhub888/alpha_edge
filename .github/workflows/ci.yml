name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Exclude heavy GPU/ML packages not needed for unit tests
          grep -v "^torch\|^transformers\|^catboost\|^onnxruntime\|^chromadb\|^lancedb\|^crewai" requirements.txt > requirements_ci.txt
          pip install -r requirements_ci.txt
          # Pin httpx to avoid groq/alpaca-py proxies kwarg breakage in httpx 0.28+
          pip install "httpx>=0.27,<0.28"

      - name: Run tests
        run: |
          pytest tests/ -x --tb=short -q
        env:
          # Empty keys -> broker/veto agent initialise as disabled, no real HTTP client created
          ALPACA_API_KEY: ""
          ALPACA_SECRET_KEY: ""
          ALPACA_PAPER: "true"
          GROQ_API_KEY: ""
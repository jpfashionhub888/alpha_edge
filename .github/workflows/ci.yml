name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install prod deps excluding heavy GPU packages not needed for tests
          grep -v "^torch\|^transformers\|^catboost\|^onnxruntime\|^chromadb\|^lancedb\|^crewai" requirements.txt > requirements_ci.txt
          pip install -r requirements_ci.txt

      - name: Run tests
        run: |
          pytest tests/ -x --tb=short -q --cov=. --cov-report=term-missing
        env:
          ALPACA_API_KEY: dummy_key
          ALPACA_SECRET_KEY: dummy_secret
          ALPACA_PAPER: "true"
          GROQ_API_KEY: dummy_key

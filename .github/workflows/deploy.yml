# .github/workflows/deploy.yml
# AlphaEdge Auto-Deploy — triggers on every push to main
# Pulls latest code on VPS and regenerates the dashboard HTML.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VPS_SSH_KEY      — contents of C:\Users\giris\.ssh\id_alpha_edge  (private key)
#   VPS_USER         — root
#
# VPS IP is hardcoded below. Update it here if the server moves.

name: 🚀 Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to alphaedgetrading.duckdns.org
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout (for context only)
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: 🌐 Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          # Try keyscan; if it fails, fall back to StrictHostKeyChecking=accept-new
          ssh-keyscan -T 10 -H "67.207.82.11" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "Host 67.207.82.11" >> ~/.ssh/config
          echo "  StrictHostKeyChecking accept-new" >> ~/.ssh/config
          echo "  ConnectTimeout 15" >> ~/.ssh/config

      - name: 🚀 Deploy — git pull + regenerate dashboard
        run: |
          ssh ${{ secrets.VPS_USER }}@67.207.82.11 << 'ENDSSH'
            set -e

            echo "=== Stashing any local generated files ==="
            cd /root/alpha_edge
            git stash

            echo ""
            echo "=== Pulling latest code ==="
            git pull origin main

            echo ""
            echo "=== Regenerating dashboard ==="
            source venv/bin/activate 2>/dev/null || true
            python3 generate_dashboard.py

            echo ""
            echo "=== Deploy complete! ==="
            echo "Dashboard: https://alphaedgetrading.duckdns.org/"
          ENDSSH

      - name: ✅ Notify success
        if: success()
        run: |
          echo "✅ Deployed successfully to https://alphaedgetrading.duckdns.org/"
          echo "Commit: ${{ github.sha }}"
          echo "By: ${{ github.actor }}"

      - name: ❌ Notify failure
        if: failure()
        run: |
          echo "❌ Deploy failed. Check SSH connection and server status."
          echo "Host: 67.207.82.11 (alphaedgetrading.duckdns.org)"
